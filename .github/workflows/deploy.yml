name: Deploy VIGIL to Infomaniak
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ssh.infomaniak.com >> ~/.ssh/known_hosts
      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            ./ \
            ${{ secrets.INFOMANIAK_USER }}@ssh.infomaniak.com:${{ secrets.INFOMANIAK_PATH }}/
